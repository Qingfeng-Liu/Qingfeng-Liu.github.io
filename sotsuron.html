<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卒業研究 — 資料ダウンロード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6fb;
      --text: #232946;
      --muted: #6e738d;
      --accent: #2196f3;
      --accent-2: #1565c0;
      --line: rgba(35,41,70,0.10);
      --radius-lg: 22px;
      --radius-md: 14px;
      --maxw: 860px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }
    a {
      color: var(--accent-2);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--line);
    }
    .header-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 18px 24px;
    }
    .brand-top {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .brand-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    /* Main */
    .main {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* Page title */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .page-sub {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    /* Section */
    .dl-section {
      margin-bottom: 48px;
    }
    .dl-section h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }
    .dl-section .desc {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
      margin-bottom: 20px;
    }

    /* Sub-section */
    .dl-group {
      margin-top: 20px;
    }
    .dl-group h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    /* Download buttons */
    .dl-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      color: var(--accent-2);
      text-decoration: none;
      transition: box-shadow 0.18s, transform 0.18s;
      box-shadow: 0 2px 8px rgba(35,41,70,0.06);
    }
    .dl-btn:hover {
      box-shadow: 0 6px 18px rgba(33,150,243,0.14);
      transform: translateY(-2px);
      text-decoration: none;
    }
    .dl-btn .icon {
      font-size: 18px;
    }
    .dl-btn .label {
      line-height: 1.3;
    }
    .dl-btn .ext {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 30px 24px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand-top">Hosei University — Liu Lab</div>
    <div class="brand-title">卒業研究 資料ダウンロード</div>
  </div>
</header>

<main class="main">

  <div class="page-title">卒業研究関係</div>
  <div class="page-sub">各種様式・テンプレートは以下よりダウンロードしてください。</div>

  <!-- 聴講レポート -->
  <div class="dl-section">
    <h2>聴講レポート様式</h2>
    <p class="desc">卒論研究中間ポスター発表会において、他の学生の発表を聴講した際に提出するレポートの様式です。</p>

    <div class="dl-group">
      <h3>PDF版</h3>
      <div class="dl-list">
        <a class="dl-btn" href="聴講レポート様式.pdf" download>
          <span class="icon">📄</span>
          <span class="label">
            聴講レポート様式<br>
            <span class="ext">PDF</span>
          </span>
        </a>
      </div>
    </div>

    <div class="dl-group">
      <h3>LaTeX版</h3>
      <div class="dl-list">
        <a class="dl-btn" href="聴講レポート様式.tex" download>
          <span class="icon">📝</span>
          <span class="label">
            聴講レポート様式<br>
            <span class="ext">TEX (LuaLaTeX)</span>
          </span>
        </a>
      </div>
    </div>
  </div>

</main>

<footer class="site-footer">
  &copy; Qingfeng Liu, Hosei University
</footer>

</body>
</html>
